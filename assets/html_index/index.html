<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQA Evaluation Dashboard</title>
    <style>
        /* Dark & Modern Professional Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            background-color: #1a1a1e;
            border: 1px solid #2d2d34;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 1100px; /* افزایش جزیی عرض برای جاگیری بهتر ۵ کارت */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background-color: #252529;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 35px;
            border-top: 1px solid #2d2d34;
            padding-top: 30px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-text {
            color: #3b82f6;
            font-size: 0.95rem;
            animation: pulse 1.5s infinite;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .level-card {
            background-color: #232329;
            border: 2px solid #3f3f46;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .level-card:hover {
            transform: translateY(-4px);
            border-color: #60a5fa;
        }

        .level-card.selected {
            border-color: #2563eb;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            background-color: #1e293b;
        }

        .image-clipper {
            width: 100%;
            height: 180px; /* تنظیم ارتفاع تقریبی کارت */
            overflow: hidden;
            position: relative;
        }

        .image-clipper img {
            position: absolute;
            width: 500%; /* ۵ برابر کردن عرض برای پوشش کل محدوده */
            height: 100%;
            object-fit: cover;
            top: 0;
        }

        .card-caption {
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            border-top: 1px solid #2d2d34;
            background: #1c1c21;
        }

        .level-card.selected .card-caption {
            background: #2563eb;
            color: #ffffff;
        }

        .selection-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #64748b;
            background: transparent;
            z-index: 2;
            transition: all 0.2s ease;
        }

        .level-card.selected .selection-indicator {
            border-color: #ffffff;
            background: #ffffff;
            box-shadow: inset 0 0 0 4px #2563eb;
        }

        .status-badge {
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #1e1b4b;
            border: 1px solid #312e81;
            color: #818cf8;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Image Quality Assessment Dashboard</h2>
    <p class="subtitle">Select reference image and distortion parameters</p>

    <div class="control-panel">
        <div class="form-group">
            <label for="imgNum">Reference Image:</label>
            <select id="imgNum"></select>
        </div>

        <div class="form-group">
            <label for="distType">Distortion Type:</label>
            <select id="distType"></select>
        </div>
    </div>

    <button onclick="generateImage()">Render & Process Image</button>

    <div id="result">
        <span style="color: #64748b; font-size: 0.9rem;">No image loaded. Select parameters and click render.</span>
    </div>

    <div class="status-badge" id="selectionStatus">
        No level selected yet.
    </div>
</div>

<script>
    const imgSelect = document.getElementById('imgNum');
    for (let i = 1; i <= 25; i++) {
        imgSelect.options[imgSelect.options.length] = new Option(`Reference Image ${i}`, i);
    }

    const distSelect = document.getElementById('distType');
    for (let i = 1; i <= 24; i++) {
        distSelect.options[distSelect.options.length] = new Option(`Distortion Type ${i}`, i);
    }

    let currentImgObjectUrl = null;
    let selectedLevel = null;

    function generateImage() {
        const imgNum = document.getElementById('imgNum').value;
        const distType = document.getElementById('distType').value;
        const resultDiv = document.getElementById('result');
        const statusBadge = document.getElementById('selectionStatus');

        // ریست کردن انتخاب‌های قبلی کاربران هنگام درخواست جدید
        selectedLevel = null;
        statusBadge.style.display = 'none';

        const serverUrl = "https://donut-footwork-refinery.ngrok-free.dev"; 
        const finalUrl = `${serverUrl}/generate-image?img_num=${imgNum}&dist_type=${distType}`;

        resultDiv.innerHTML = "<span class='loading-text'>Fetching and processing image from server...</span>";

        fetch(finalUrl, {
            method: "GET",
            headers: {
                "ngrok-skip-browser-warning": "any_value_works"
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Server responded with an error status");
            }
            return response.blob(); 
        })
        .then(blob => {
            if (currentImgObjectUrl) {
                URL.revokeObjectURL(currentImgObjectUrl);
            }

            currentImgObjectUrl = URL.createObjectURL(blob);

            // ایجاد گرید باکس ۵ کارته تعاملی
            const gridContainer = document.createElement('div');
            gridContainer.className = 'cards-grid';

            for (let i = 0; i < 5; i++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.setAttribute('data-level', i + 1);
                
                // مدیریت کلیک روی هر کارت
                card.onclick = function() {
                    selectLevel(i + 1);
                };

                // بخش برش تصویر ساب‌پلات پایتون با تغییر ویژگی left به صورت درصدی
                const clipper = document.createElement('div');
                clipper.className = 'image-clipper';

                const img = document.createElement('img');
                img.src = currentImgObjectUrl;
                // جادوی اصلی: شیفت دادن افقی عکس سراسری بر اساس کارت مربوطه
                img.style.left = `-${i * 100}%`;

                const indicator = document.createElement('div');
                indicator.className = 'selection-indicator';

                const caption = document.createElement('div');
                caption.className = 'card-caption';
                caption.innerText = `Level ${i + 1}`;

                clipper.appendChild(img);
                card.appendChild(indicator);
                clipper.appendChild(indicator);
                card.appendChild(clipper);
                card.appendChild(caption);
                
                gridContainer.appendChild(card);
            }
            
            resultDiv.innerHTML = ""; 
            resultDiv.appendChild(gridContainer);
        })
        .catch(error => {
            console.error("Fetch error:", error);
            resultDiv.innerHTML = "<p style='color:#ef4444; font-size: 0.9rem;'>❌ Connection Error! Make sure FastAPI server is running and Ngrok URL is correct.</p>";
        });
    }

    function selectLevel(level) {
        selectedLevel = level;
        
        document.querySelectorAll('.level-card').forEach(card => {
            card.classList.remove('selected');
        });

        const targetCard = document.querySelector(`.level-card[data-level='${level}']`);
        if (targetCard) {
            targetCard.classList.add('selected');
        }

        const statusBadge = document.getElementById('selectionStatus');
        statusBadge.innerHTML = `✨ <strong>Level ${level}</strong> successfully selected and ready to submit!`;
        statusBadge.style.display = 'inline-block';

        console.log(`[SYSTEM INFO] User selected Distortion Level: ${level}`);
    }
</script>

</body>
</html>
