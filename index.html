<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQA Evaluation Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Image Quality Assessment Dashboard</h2>
    <p class="subtitle">Select reference image and distortion parameters</p>

    <div class="control-panel">
        <div class="form-group">
            <label for="imgNum">Reference Image:</label>
            <select id="imgNum"></select>
        </div>

        <div class="form-group">
            <label for="distType">Distortion Type:</label>
            <select id="distType"></select>
        </div>
    </div>

    <button id="renderBtn">Render & Process Image</button>

    <div id="result">
        <span style="color: #64748b; font-size: 0.9rem;">No image loaded. Select parameters and click render.</span>
    </div>

    <div class="submit-container" id="submitContainer">
        <div class="submit-box">
            <div class="submit-info">
                <h4 id="selectedLevelText">No level selected</h4>
                <p>asdadasdasd</p>
            </div>
            <button class="btn-submit" id="confirmBtn">Confirm & Proceed</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
