<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQA Evaluation Dashboard</title>
    <style>
        /* Dark & Modern Professional Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            background-color: #1a1a1e;
            border: 1px solid #2d2d34;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            /* عرض کل باکس را بیشتر کردیم تا فضای کافی برای تصویر بزرگ وجود داشته باشد */
            max-width: 1000px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* چیدمان فرم‌ها به صورت دو ستونه برای استفاده بهینه از فضا */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background-color: #252529;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        /* بخش نمایش تصویر بزرگ */
        #result {
            margin-top: 35px;
            border-top: 1px solid #2d2d34;
            padding-top: 30px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-text {
            color: #3b82f6;
            font-size: 0.95rem;
            animation: pulse 1.5s infinite;
        }

        /* 🛠️ اعمال تغییرات اصلی برای بزرگتر شدن تصویر */
        img.output-image {
            width: 100%; /* تصویر کل پهنای باکس باکس (1000px) را پر می‌کند */
            max-width: 920px; /* حداکثر اندازه مجاز */
            height: auto; /* حفظ نسبت ابعاد تصویر برای دفرمه نشدن */
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid #3f3f46;
            cursor: zoom-in; /* تغییر شکل موس به ذره‌بین برای فهماندن قابلیت کلیک */
            transition: transform 0.3s ease;
        }

        img.output-image:hover {
            transform: scale(1.01); /* افکت زوم بسیار ملایم هنگام هاور */
        }

        /* استایل حالت Fullscreen/Lightbox هنگام کلیک روی عکس */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 12, 0.95);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Image Quality Assessment Dashboard</h2>
    <p class="subtitle">Select reference image and distortion parameters</p>

    <div class="control-panel">
        <div class="form-group">
            <label for="imgNum">Reference Image:</label>
            <select id="imgNum"></select>
        </div>

        <div class="form-group">
            <label for="distType">Distortion Type:</label>
            <select id="distType"></select>
        </div>
    </div>

    <button onclick="generateImage()">Render & Process Image</button>

    <div id="result">
        <span style="color: #64748b; font-size: 0.9rem;">No image loaded. Select parameters and click render.</span>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged view">
</div>

<script>
    const imgSelect = document.getElementById('imgNum');
    for (let i = 1; i <= 25; i++) {
        imgSelect.options[imgSelect.options.length] = new Option(`Reference Image ${i}`, i);
    }

    const distSelect = document.getElementById('distType');
    for (let i = 1; i <= 24; i++) {
        distSelect.options[distSelect.options.length] = new Option(`Distortion Type ${i}`, i);
    }

    function generateImage() {
        const imgNum = document.getElementById('imgNum').value;
        const distType = document.getElementById('distType').value;
        const resultDiv = document.getElementById('result');

        const serverUrl = "http://127.0.0.1:8000"; 
        const finalUrl = `${serverUrl}/generate-image?img_num=${imgNum}&dist_type=${distType}`;

        resultDiv.innerHTML = "<span class='loading-text'>Fetching and processing image from server...</span>";

        const img = document.createElement('img');
        img.src = finalUrl;
        img.className = 'output-image';
        
        img.onclick = function() {
            openLightbox(finalUrl);
        };
        
        img.onload = function() {
            resultDiv.innerHTML = ""; 
            resultDiv.appendChild(img);
        };

        img.onerror = function() {
            resultDiv.innerHTML = "<p style='color:#ef4444; font-size: 0.9rem;'>❌ Connection Error! Make sure FastAPI server is running.</p>";
        };
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
</script>

</body>
</html>
